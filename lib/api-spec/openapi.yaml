openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Theorema Aureum 143 — Certificate Ledger API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: certificates
    description: Certificate module operations
  - name: storage
    description: Object storage operations
  - name: lean
    description: Lean 4 verification log
  - name: morningstar
    description: MorningStar-Lab probe ledger
  - name: ledger
    description: At-rest ledger integrity
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /certificates:
    get:
      operationId: listCertificates
      tags: [certificates]
      summary: List all module certificates
      responses:
        "200":
          description: List of certificates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"

  /certificates/summary:
    get:
      operationId: getCertificateSummary
      tags: [certificates]
      summary: Get DAG summary — overall verification status
      responses:
        "200":
          description: Summary of the proof chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateSummary"

  /certificates/{moduleId}:
    get:
      operationId: getCertificate
      tags: [certificates]
      summary: Get a specific certificate by module ID (e.g. M1)
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Certificate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "404":
          description: Not found
    patch:
      operationId: updateCertificate
      tags: [certificates]
      summary: Update a certificate (attach PDF, notes, or mark verified)
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificateUpdate"
      responses:
        "200":
          description: Updated certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "404":
          description: Not found

  /lean/verify:
    get:
      operationId: getLeanVerification
      tags: [lean]
      summary: Get the Lean 4 verification log (axiom debt status)
      responses:
        "200":
          description: Verification log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeanVerification"

  /lean/verify/rebuild:
    post:
      operationId: rebuildLeanVerification
      tags: [lean]
      summary: Re-run lean-proof/regenerate.sh and refresh VERIFY.txt
      description: |
        Shells out to `lean-proof/regenerate.sh` to rebuild the Lean proof and
        rewrite VERIFY.txt. Returns the script's stdout / stderr along with the
        re-parsed verification log on success.
      responses:
        "200":
          description: Rebuild attempted (check `ok` for success)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeanRebuildResult"

  /lean/verify/rebuild/cancel:
    post:
      operationId: cancelLeanVerificationRebuild
      tags: [lean]
      summary: Cancel the currently in-flight Lean rebuild
      description: |
        Sends SIGTERM to the in-flight `regenerate.sh` child process so a
        referee can abort a rebuild without waiting for the 5-minute timeout.
        Requires the same `Authorization: Bearer <token>` header as the
        rebuild endpoints. Returns 409 if no rebuild is currently in flight.
        The active streaming rebuild will emit a final `result` frame
        reporting the cancellation.
      responses:
        "200":
          description: Cancellation signal accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeanRebuildCancelResult"
        "401":
          description: Missing or invalid referee rebuild token
        "409":
          description: No Lean rebuild is currently in flight
        "503":
          description: Rebuilds are disabled (LEAN_REBUILD_TOKEN not configured)

  /lean/verify/history:
    get:
      operationId: getLeanRebuildHistory
      tags: [lean]
      summary: Recent Lean rebuild attempts (audit trail)
      description: |
        Returns the most recent ~20 in-memory rebuild attempts (timestamp,
        duration, exit code, ok, error). Cleared on server restart. No auth
        required — results are not sensitive.
      responses:
        "200":
          description: Rebuild history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeanRebuildHistory"

  /lean/verify/rebuild/stream:
    post:
      operationId: rebuildLeanVerificationStream
      tags: [lean]
      summary: Stream a Lean rebuild's stdout/stderr live (SSE)
      description: |
        Same auth and semantics as `/lean/verify/rebuild`, but streams the
        script's stdout/stderr line-by-line as Server-Sent Events so the UI can
        show progress instead of a frozen spinner.

        Events emitted (each `data:` line is a JSON object):
        - `event: line`    — `{ "stream": "stdout"|"stderr", "line": "..." }`
        - `event: result`  — final `LeanRebuildResult` payload
        - `event: error`   — `{ "error": "..." }` if the stream aborts early

        The stream ends after the `result` (or `error`) event.
      responses:
        "200":
          description: Server-Sent Events stream of rebuild progress
          content:
            text/event-stream:
              schema:
                type: string

  /lean/lockouts:
    get:
      operationId: getLeanLockouts
      tags: [lean]
      summary: List active rebuild-token brute-force lockouts
      description: |
        Returns the per-IP brute-force-protection state for the rebuild
        endpoints: IPs currently locked out (with when the lockout expires)
        and IPs that have recent failed attempts but aren't yet locked.

        Requires `Authorization: Bearer <LEAN_REBUILD_TOKEN>`. The per-IP
        lockout check is intentionally skipped on this endpoint so an
        operator on a shared/locked IP can still investigate.
      responses:
        "200":
          description: Lockout snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeanLockoutsResponse"
        "401":
          description: Missing or invalid referee rebuild token
        "503":
          description: Rebuilds are disabled (LEAN_REBUILD_TOKEN not configured)

  /lean/lockouts/clear:
    post:
      operationId: clearLeanLockout
      tags: [lean]
      summary: Clear a per-IP rebuild-token lockout
      description: |
        Removes the failure record for a single IP, immediately unblocking
        further rebuild-token attempts from it. Requires the same
        `Authorization: Bearer <LEAN_REBUILD_TOKEN>` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeanLockoutClearRequest"
      responses:
        "200":
          description: Lockout cleared (or no record found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeanLockoutClearResult"
        "400":
          description: Missing or invalid `ip`
        "401":
          description: Missing or invalid referee rebuild token
        "503":
          description: Rebuilds are disabled (LEAN_REBUILD_TOKEN not configured)

  /morningstar/hits:
    get:
      operationId: getMorningstarHits
      tags: [morningstar]
      summary: Read the MorningStar-Lab probe ledger (read-only)
      description: |
        Returns the parsed contents of `data/hits.txt`: the header comment
        lines, the five frozen Genesis lines (including the
        `--- GENESIS SEAL ---` marker), the SHA-256 of the immutable
        preamble together with the expected baked-in seal hash and a
        match/mismatch flag, plus the most recent N probe lines parsed
        into structured fields. This endpoint never writes to `hits.txt`.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of recent probes to return (default 50, max 500).
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Parsed ledger snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MorningstarHits"
        "500":
          description: Ledger file unavailable or malformed

  /ledger/integrity:
    get:
      operationId: getLedgerIntegrity
      tags: [ledger]
      summary: At-rest integrity status of `data/hits.txt`
      description: |
        Read-only health probe of the append-only probe ledger. Mirrors
        the logic of `scripts/check-ledger-integrity.py` and
        `kernel._verify_checkpoint`: compares `data/hits.txt` against
        the committed `data/hits.txt.checkpoint` sidecar, which records
        the (size, sha256) of the last known-good prefix.

        Returns `ok` when the live file is at least as long as the
        checkpoint and the sha256 of its first `checkpointSize` bytes
        matches `checkpointSha`. Returns a `mismatch` status (with a
        human-readable `reason` and a structured `failureMode`) when
        the live file has shrunk, been rewritten in place, the
        checkpoint sidecar is malformed/missing, or the ledger file
        itself is missing. This endpoint NEVER writes to the ledger.
      responses:
        "200":
          description: Integrity snapshot (healthy or not)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerIntegrityStatus"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for a PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /storage/objects/{objectPath}:
    get:
      operationId: getObject
      tags: [storage]
      summary: Serve an uploaded object (PDF)
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Certificate:
      type: object
      required: [moduleId, title, claim, status, sourceSha, stdoutSha, parentShas, dagPosition]
      properties:
        moduleId:
          type: string
          description: "e.g. M1, M2, ... M7"
        title:
          type: string
        claim:
          type: string
          description: One-sentence summary of what this module certifies
        status:
          type: string
          enum: [CERTIFIED, AWAITING, LOCKED, DISCHARGED]
        sourceFile:
          type: ["string", "null"]
        sourceSha:
          type: string
        stdoutSha:
          type: string
        parentShas:
          type: array
          items:
            type: string
          description: SHA-256 digests of parent module outputs this module depends on
        dagPosition:
          type: integer
          description: Position in the M1→M7 DAG (1-indexed)
        pdfObjectPath:
          type: ["string", "null"]
          description: Object storage path of the uploaded PDF
        leanBinding:
          type: ["string", "null"]
          description: Lean theorem name bound to this certificate
        notes:
          type: ["string", "null"]
        updatedAt:
          type: string
          format: date-time

    CertificateUpdate:
      type: object
      properties:
        pdfObjectPath:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: ["string", "null"]

    CertificateSummary:
      type: object
      required: [masterSha, totalModules, certifiedCount, awaitingCount, dagSealed]
      properties:
        masterSha:
          type: string
          description: Master manifest SHA-256 (cat m1.out..m6.out | sha256sum)
        totalModules:
          type: integer
        certifiedCount:
          type: integer
        awaitingCount:
          type: integer
        dagSealed:
          type: boolean
        pdfUploadedCount:
          type: integer
        pdfTotal:
          type: integer

    LeanVerification:
      type: object
      required: [toolchain, dateVerified, axiomDebt, axiomLines, content]
      properties:
        toolchain:
          type: string
          description: Lean toolchain version string
        dateVerified:
          type: string
          description: Date the verification log was produced
        axiomDebt:
          type: array
          items:
            type: string
          description: List of remaining axioms (empty when fully discharged)
        axiomLines:
          type: array
          items:
            type: string
          description: Raw "does not depend on any axioms" lines from `lake env lean Verify.lean`
        content:
          type: string
          description: Full raw contents of lean-proof/VERIFY.txt
        lastModified:
          type: string
          format: date-time
          description: ISO-8601 timestamp of the VERIFY.txt file's last modification (mtime)
        ageDays:
          type: number
          description: Age in days between the file's mtime and the time the response was generated

    LeanRebuildResult:
      type: object
      required: [ok, exitCode, stdout, stderr, durationMs]
      properties:
        ok:
          type: boolean
          description: True iff the rebuild script exited 0 and VERIFY.txt was refreshed
        exitCode:
          type: integer
          description: Exit code of the rebuild script (or -1 if it could not be spawned)
        stdout:
          type: string
        stderr:
          type: string
        durationMs:
          type: integer
          description: Wall-clock duration of the rebuild in milliseconds
        error:
          type: ["string", "null"]
          description: High-level error message when the script could not be launched or completed (e.g. `lake` not installed, timeout)
        verification:
          oneOf:
            - $ref: "#/components/schemas/LeanVerification"
            - type: "null"
          description: Re-parsed verification log after a successful rebuild

    LeanRebuildHistoryEntry:
      type: object
      required: [timestamp, durationMs, exitCode, ok, streamed]
      properties:
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp of when the rebuild finished
        durationMs:
          type: integer
          description: Wall-clock duration of the rebuild in milliseconds
        exitCode:
          type: integer
          description: Exit code of the rebuild script (or -1 if it could not be spawned)
        ok:
          type: boolean
          description: True iff the rebuild exited 0 and VERIFY.txt was refreshed
        error:
          type: ["string", "null"]
          description: High-level error message when the rebuild failed
        streamed:
          type: boolean
          description: True if this attempt was made via the streaming SSE endpoint
        refereeName:
          type: ["string", "null"]
          description: |
            Identity of the referee who triggered this rebuild. With named
            tokens (`LEAN_REBUILD_TOKENS=alice:tok1,bob:tok2`), this is the
            token's owner name. With the shared `LEAN_REBUILD_TOKEN`, this
            is the sanitized value of the optional `X-Referee-Name`
            request header (or `null` if not provided).

    LeanRebuildHistory:
      type: object
      required: [entries, capacity]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeanRebuildHistoryEntry"
          description: Most recent attempts first
        capacity:
          type: integer
          description: Maximum number of attempts retained in memory

    LeanRebuildCancelResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          description: True when a cancellation signal was successfully sent.
        message:
          type: string
        error:
          type: string

    LeanLockout:
      type: object
      required: [ip, failedAttempts, lockedSince, lockedUntil, retryAfterMs]
      properties:
        ip:
          type: string
          description: The locked-out client IP
        failedAttempts:
          type: integer
          description: Number of bad-token attempts that triggered the lockout
        lockedSince:
          type: string
          format: date-time
          description: ISO-8601 timestamp of when the lockout began
        lockedUntil:
          type: string
          format: date-time
          description: ISO-8601 timestamp of when the lockout will expire
        retryAfterMs:
          type: integer
          description: Milliseconds remaining until the lockout expires

    LeanFailingIp:
      type: object
      required: [ip, failedAttempts, firstFailureAt, windowExpiresAt]
      properties:
        ip:
          type: string
          description: A client IP with recent failed attempts but not yet locked
        failedAttempts:
          type: integer
        firstFailureAt:
          type: string
          format: date-time
        windowExpiresAt:
          type: string
          format: date-time
          description: When the failure-counting window expires (record drops off)

    LeanLockoutsResponse:
      type: object
      required: [activeLockouts, failingIps, maxFailedAttempts, lockoutMs, failureWindowMs]
      properties:
        activeLockouts:
          type: array
          items:
            $ref: "#/components/schemas/LeanLockout"
        failingIps:
          type: array
          items:
            $ref: "#/components/schemas/LeanFailingIp"
        maxFailedAttempts:
          type: integer
          description: How many failed attempts trigger a lockout
        lockoutMs:
          type: integer
          description: Lockout duration in milliseconds
        failureWindowMs:
          type: integer
          description: Sliding window in milliseconds over which failures are counted

    LeanLockoutClearRequest:
      type: object
      required: [ip]
      properties:
        ip:
          type: string

    LeanLockoutClearResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        cleared:
          type: boolean
          description: True if an active failure/lockout record was actually removed
        message:
          type: string
        error:
          type: string

    MorningstarProbe:
      type: object
      required: [lineNumber, raw]
      properties:
        lineNumber:
          type: integer
          description: 1-indexed line number in `data/hits.txt`
        raw:
          type: string
          description: The original line, verbatim
        ts:
          type: ["string", "null"]
          description: Raw `ts=` value (nanoseconds since the Unix epoch, as recorded)
        timestamp:
          type: ["string", "null"]
          format: date-time
          description: ISO-8601 conversion of `ts` (UTC) when parseable
        h:
          type: ["integer", "null"]
        n:
          type: ["integer", "null"]
        re:
          type: ["number", "null"]
        im:
          type: ["number", "null"]
        lNonvanish:
          type: ["boolean", "null"]
        rhOk:
          type: ["boolean", "null"]
        kmsBeta:
          type: ["number", "null"]
          description: |
            Bost–Connes inverse-temperature β = 1/Re(s) at the probe
            point. `null` when the ledger line predates the kms_beta
            field or recorded `NA` (e.g. Re(s)=0).
        tag:
          type: ["string", "null"]
          description: Backend tag (e.g. MPMATH_ZETA, MPMATH_DIRICHLET_TRIVIAL, NEEDS_SAGE)
        lAbs:
          type: ["string", "null"]
          description: Raw `L_abs=` value when present (kept as a string to preserve precision and `NA`)
        reason:
          type: ["string", "null"]
        sha:
          type: ["string", "null"]
          description: SHA-256 the kernel recorded for this probe line

    MorningstarHits:
      type: object
      required:
        - headerLines
        - genesisLines
        - sealSha
        - expectedSealSha
        - sealOk
        - probes
        - totalProbes
        - returnedProbes
        - limit
        - ledgerPath
        - lastModified
      properties:
        headerLines:
          type: array
          items:
            type: string
          description: Comment lines (typically lines 1–4) preceding the Genesis block
        genesisLines:
          type: array
          items:
            type: string
          description: |
            The five frozen Genesis lines through and including the
            `--- GENESIS SEAL ---` marker (e.g. `437`, `1094`,
            `axioms=[] 2026-05-24`, `M13_CERT_SHA256=...`,
            `--- GENESIS SEAL ---`).
        sealSha:
          type: string
          description: SHA-256 of the immutable preamble (header + Genesis lines through marker, each terminated by `\n`)
        expectedSealSha:
          type: string
          description: Baked-in expected seal hash from `scripts/check-genesis-seal.py`
        sealOk:
          type: boolean
          description: True iff `sealSha === expectedSealSha`
        probes:
          type: array
          items:
            $ref: "#/components/schemas/MorningstarProbe"
          description: Most-recent-first slice of probe lines, length capped by `limit`
        totalProbes:
          type: integer
          description: Total number of probe lines in the ledger (lines after the Genesis marker)
        returnedProbes:
          type: integer
          description: Number of probes included in `probes`
        limit:
          type: integer
          description: Effective limit applied to the response
        ledgerPath:
          type: string
          description: Filesystem path to the ledger that was read (for operator clarity)
        lastModified:
          type: string
          format: date-time
          description: ISO-8601 mtime of the ledger file

    LedgerIntegrityStatus:
      type: object
      required:
        - status
        - checkedAt
        - ledgerPath
        - checkpointPath
      properties:
        status:
          type: string
          enum: [ok, mismatch, missing]
          description: |
            `ok` when the live ledger's first `checkpointSize` bytes hash
            to `checkpointSha`. `missing` when either `data/hits.txt` or
            its checkpoint sidecar is absent — a distinct first-class
            state so callers can distinguish "the file is gone" from
            "the file has been tampered". `mismatch` when the live
            file is shorter than the checkpoint, has been rewritten in
            place, the checkpoint is malformed, or it cannot be read.
        failureMode:
          type: ["string", "null"]
          description: |
            Structured failure code. One of `hits_missing` /
            `checkpoint_missing` (when `status` is `missing`), or
            `checkpoint_malformed` / `hits_truncated` /
            `hits_rewritten_in_place` / `checkpoint_unreadable`
            (when `status` is `mismatch`). Null when healthy.
        reason:
          type: ["string", "null"]
          description: Human-readable mismatch reason. Null when healthy.
        checkpointSize:
          type: ["integer", "null"]
          description: Bytes recorded in `data/hits.txt.checkpoint`
        checkpointSha:
          type: ["string", "null"]
          description: SHA-256 (hex) recorded in `data/hits.txt.checkpoint`
        liveSize:
          type: ["integer", "null"]
          description: Current byte size of `data/hits.txt`
        livePrefixSha:
          type: ["string", "null"]
          description: |
            SHA-256 (hex) of the first `checkpointSize` bytes of the
            live ledger. Equals `checkpointSha` when `status` is `ok`.
        growthBytes:
          type: ["integer", "null"]
          description: |
            `liveSize - checkpointSize` when both are known and positive
            (legitimate appends since the last checkpoint update).
        checkedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp the check was performed (server time)
        ledgerLastModified:
          type: ["string", "null"]
          format: date-time
          description: ISO-8601 mtime of `data/hits.txt` (null if missing)
        ledgerPath:
          type: string
          description: Filesystem path of the ledger that was checked
        checkpointPath:
          type: string
          description: Filesystem path of the checkpoint sidecar

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
